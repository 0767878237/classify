train_dir: data/train
test_dir: data/test
output_dir: outputs
artifact_dir: artifacts
model_name: resnet18
image_size: 160
batch_size: 32
epochs: 10
num_workers: 2
learning_rate_head: 0.0015
learning_rate_backbone: 0.00008
weight_decay: 0.0001
scheduler: cosine
min_learning_rate: 0.000001
train_split: 0.8
random_seed: 42
early_stopping_patience: 3
label_smoothing: 0.03
freeze_epochs: 10
tta_passes: 1
use_mixed_precision: true
enterprise_threshold: 0.75
validate_every: 2
compute_train_metrics: false
fine_tune_backbone: false
cpu_num_threads: 4
use_fast_transforms: true
